<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF 魔改工具</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YWCX7XR4PY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-YWCX7XR4PY');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/omggif@1.0.10/omggif.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #1a1a1a;
            --accent: #00ff88;
            --accent2: #ff0088;
            --text: #e0e0e0
        }

        * {
            box-sizing: border-box
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px
        }

        .header {
            text-align: center;
            margin: 20px 0;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .header h1 {
            margin: 0;
            font-size: 2em
        }

        .header p {
            margin: 5px 0;
            color: #666;
            font-size: .9em
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            width: 100%;
            justify-content: center
        }

        .panel {
            background: var(--panel);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .7);
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 320px;
            flex: 1;
            max-width: 400px;
            height: fit-content;
            border: 1px solid #333
        }

        .preview-box {
            flex: 2;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            border-radius: 16px;
            border: 2px dashed #333;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 136, .2)
        }

        canvas,
        img {
            max-width: 100%;
            max-height: 80vh;
            box-shadow: 0 0 40px rgba(0, 0, 0, .8);
            border-radius: 8px
        }

        h2 {
            margin: 0 0 15px 0;
            color: var(--accent);
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            font-size: 1.3em;
            text-transform: uppercase;
            letter-spacing: 1px
        }

        button {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .3s;
            font-weight: 700;
            font-size: .9em
        }

        button:hover {
            background: #333;
            border-color: var(--accent);
            transform: translateY(-2px)
        }

        button.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(0, 255, 136, .3)
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px
        }

        .control-group {
            background: #151515;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #282828
        }

        .control-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--accent);
            font-weight: 700;
            font-size: .9em
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: 0
        }

        input[type=file] {
            background: #111;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            border: 2px dashed #333;
            cursor: pointer;
            transition: .3s
        }

        input[type=file]:hover {
            border-color: var(--accent)
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: .75em;
            margin-top: 5px
        }

        .action-btn {
            color: #000;
            border: none;
            font-size: 1.1em;
            margin-top: 5px;
            padding: 14px;
            font-weight: 900
        }

        .preview-btn {
            background: linear-gradient(135deg, #00aaff, #0066cc);
            box-shadow: 0 6px 20px rgba(0, 170, 255, .3)
        }

        .preview-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 170, 255, .5)
        }

        .download-btn {
            background: linear-gradient(135deg, var(--accent), #00cc70);
            box-shadow: 0 6px 20px rgba(0, 255, 136, .4)
        }

        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, .6)
        }

        .action-btn:disabled {
            background: #333 !important;
            cursor: not-allowed;
            opacity: .4;
            transform: none !important;
            box-shadow: none !important
        }

        #status {
            margin-top: 10px;
            font-size: .9em;
            color: #aaa;
            text-align: center;
            white-space: pre-wrap;
            min-height: 20px
        }

        .loading-bar {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 3px;
            overflow: hidden;
            display: none;
            margin-top: 10px;
            border: 1px solid #333
        }

        .progress {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width .3s;
            box-shadow: 0 0 10px var(--accent)
        }

        .effect-badge {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: .7em;
            font-weight: 700;
            margin-left: 5px
        }

        #previewImg {
            display: none
        }

        .drop-hint {
            color: #444;
            font-size: 1.1em;
            pointer-events: none
        }

        .sub-control {
            margin-top: 10px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 6px;
            border: 1px solid #2a2a2a;
            display: none
        }

        .sub-control.visible {
            display: block
        }

        .sub-control label {
            display: block;
            margin-bottom: 6px;
            color: #999;
            font-size: .8em;
            font-weight: 600
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🎨 GIF 魔改工具</h1>
        <p>⚡ 上传文件格式：GIF / PNG / JPG</p>
    </div>
    <div class="container">
        <div class="panel">
            <h2>🛠️ 基础设置</h2>
            <div class="control-group">
                <label>📁 上传 GIF / PNG / JPG</label>
                <input type="file" id="fileInput" accept="image/gif, image/png, image/jpeg">
            </div>
            <div class="control-group">
                <label>🔄 对称模式</label>
                <div class="btn-group">
                    <button onclick="setMode('none')" id="btn-none" class="active">原图</button>
                    <button onclick="setMode('left')" id="btn-left">← 左</button>
                    <button onclick="setMode('right')" id="btn-right">右 →</button>
                    <button onclick="setMode('top')" id="btn-top">↑ 上</button>
                    <button onclick="setMode('bottom')" id="btn-bottom">下 ↓</button>
                    <button onclick="setMode('hv')" id="btn-hv">✥ 四象限</button>
                </div>
            </div>
            <div class="control-group">
                <label>🔬 分裂</label>
                <input type="range" id="splitRange" min="0" max="3" value="0" step="1">
                <div class="slider-labels"><span>1x1</span><span>2x2</span><span>4x4</span><span>8x8</span></div>
            </div>
            <div class="control-group">
                <label>🔄 旋转</label>
                <input type="range" id="rotationRange" min="0" max="3" value="0" step="1">
                <div class="slider-labels"><span>0°</span><span>90°</span><span>180°</span><span>270°</span></div>
            </div>
        </div>
        <div class="panel">
            <h2>✨ 视觉效果</h2>
            <div class="control-group">
                <label>🌈 色彩</label>
                <div class="btn-group">
                    <button onclick="setColorEffect('none')" id="color-none" class="active">正常</button>
                    <button onclick="setColorEffect('invert')" id="color-invert">反色</button>
                    <button onclick="setColorEffect('grayscale')" id="color-grayscale">灰度</button>
                    <button onclick="setColorEffect('sepia')" id="color-sepia">复古</button>
                    <button onclick="setColorEffect('rainbow')" id="color-rainbow">彩虹</button>
                    <button onclick="setColorEffect('cyberpunk')" id="color-cyberpunk">赛博</button>
                </div>
            </div>
            <div class="control-group">
                <label>💫 特效</label>
                <div class="btn-group">
                    <button onclick="setSpecialEffect('none')" id="special-none" class="active">无</button>
                    <button onclick="setSpecialEffect('pixelate')" id="special-pixelate">像素</button>
                    <button onclick="setSpecialEffect('blur')" id="special-blur">模糊</button>
                    <button onclick="setSpecialEffect('sharpen')" id="special-sharpen">锐化</button>
                    <button onclick="setSpecialEffect('edge')" id="special-edge">边缘</button>
                    <button onclick="setSpecialEffect('glitch')" id="special-glitch">风</button>
                </div>
                <div class="sub-control" id="ctrl-pixelate">
                    <label>像素块大小: <span id="pixelSizeVal">8</span>px</label>
                    <input type="range" id="pixelSizeRange" min="2" max="50" value="8" step="1">
                    <div class="slider-labels"><span>更精细</span><span>更像素化</span></div>
                </div>
                <div class="sub-control" id="ctrl-blur">
                    <label>模糊半径: <span id="blurRadiusVal">3</span>px</label>
                    <input type="range" id="blurRadiusRange" min="1" max="30" value="3" step="1">
                    <div class="slider-labels"><span>更清晰</span><span>更模糊</span></div>
                </div>
                <div class="sub-control" id="ctrl-sharpen">
                    <label>锐化力度: <span id="sharpenStrVal">1.0</span>x</label>
                    <input type="range" id="sharpenStrRange" min="0.2" max="5" value="1" step="0.1">
                    <div class="slider-labels"><span>弱</span><span>强</span></div>
                </div>
                <div class="sub-control" id="ctrl-edge">
                    <label>灵敏度: <span id="edgeThreshVal">60</span></label>
                    <input type="range" id="edgeThreshRange" min="5" max="300" value="60" step="5">
                    <div class="slider-labels"><span>轮廓粗</span><span>轮廓细</span></div>
                </div>
                <div class="sub-control" id="ctrl-glitch">
                    <label>风力: <span id="glitchStrVal">10</span></label>
                    <input type="range" id="glitchStrRange" min="2" max="100" value="10" step="1">
                    <div class="slider-labels"><span>微风</span><span>台风</span></div>
                    <label style="margin-top:8px">频率: <span id="glitchDensityVal">35</span>%</label>
                    <input type="range" id="glitchDensityRange" min="5" max="130" value="35" step="5">
                    <div class="slider-labels"><span>偶尔吹</span><span>一直吹</span></div>
                </div>
            </div>
            <div class="control-group">
                <label>💡 亮度: <span id="brightnessValue">0</span></label>
                <input type="range" id="brightnessRange" min="-100" max="100" value="0" step="1">
            </div>
            <div class="control-group">
                <label>📊 对比度: <span id="contrastValue">100</span>%</label>
                <input type="range" id="contrastRange" min="50" max="200" value="100" step="1">
            </div>
            <div class="control-group">
                <label>🎭 饱和度: <span id="saturationValue">100</span>%</label>
                <input type="range" id="saturationRange" min="0" max="200" value="100" step="1">
            </div>
        </div>
        <div class="panel">
            <h2>⚙️ 导出</h2>
            <div class="control-group">
                <label>🎞️ 帧采样 <span class="effect-badge">性能</span></label>
                <input type="range" id="frameSampleRange" min="1" max="5" value="1" step="1">
                <div class="slider-labels">
                    <span>全部</span><span>1/2</span><span>1/3</span><span>1/4</span><span>1/5</span>
                </div>
                <small style="color:#666">跳帧更快</small>
            </div>
            <div class="control-group">
                <label>📏 编码质量</label>
                <input type="range" id="qualityRange" min="1" max="300" value="1" step="1">
                <div class="slider-labels"><span>最佳</span><span>平衡</span><span>快速</span></div>
            </div>
            <div class="control-group">
                <label>🎨 颜色数量: <span id="colorCountVal">256</span> 色</label>
                <input type="range" id="colorCountRange" min="2" max="256" value="256" step="1">
                <div class="slider-labels"><span>2 色</span><span>更小文件</span><span>256 色</span></div>
            </div>
            <div class="control-group">
                <label>🔲 抖动算法</label>
                <div class="btn-group">
                    <button onclick="setDither('auto')" id="dither-auto" class="active">自动</button>
                    <button onclick="setDither('none')" id="dither-none">无抖动</button>
                    <button onclick="setDither('floyd')" id="dither-floyd">Floyd-Steinberg</button>
                    <button onclick="setDither('ordered')" id="dither-ordered">有序抖动</button>
                    <button onclick="setDither('atkinson')" id="dither-atkinson">Atkinson</button>
                </div>
                <div style="margin-top:10px">
                    <label>抖动强度: <span id="ditherStrengthVal">60</span>%</label>
                    <input type="range" id="ditherStrengthRange" min="0" max="100" value="60" step="1">
                    <div class="slider-labels"><span>更平滑</span><span>更颗粒</span></div>
                </div>
            </div>
            <div style="border-top:1px solid #333;padding-top:15px;margin-top:10px">
                <button class="action-btn preview-btn" id="previewBtn" onclick="startPreview()" disabled>👁️
                    更新预览</button>
                <button class="action-btn download-btn" id="exportBtn" onclick="processAndExport()" disabled>🎬
                    保存文件</button>
                <div id="status">上传图片试试 👆</div>
                <div class="loading-bar">
                    <div class="progress" id="progressBar"></div>
                </div>
            </div>
        </div>
        <div class="preview-box" id="previewBox">
            <span class="drop-hint" id="dropHint">📂 上传图片后这里会显示预览</span>
            <img id="previewImg" />
            <canvas id="previewCanvas"></canvas>
        </div>
    </div>
    <script>
        const ALPHA_THRESHOLD = 128;

        const state = {
            file: null, fileType: null, fileUrl: null,
            mode: 'none', splitLevel: 0, rotation: 0,
            colorEffect: 'none', specialEffect: 'none',
            brightness: 0, contrast: 100, saturation: 100,
            imgStatic: null, width: 0, height: 0,
            pixelSize: 8, blurRadius: 3, sharpenStr: 1.0,
            edgeThresh: 60, glitchStr: 10, glitchDensity: 35,
            hasTransparency: false,
            colorCount: 256,
            ditherMode: 'auto',
            ditherStrength: 60
        };

        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const previewImg = document.getElementById('previewImg');
        const statusEl = document.getElementById('status');
        const progressBar = document.getElementById('progressBar');
        const loadBarContainer = document.querySelector('.loading-bar');
        const dropHint = document.getElementById('dropHint');

        let animTimerId = null, isAnimating = false;

        document.getElementById('fileInput').addEventListener('change', handleFile);
        document.getElementById('splitRange').addEventListener('input', e => { state.splitLevel = +e.target.value; stopAndStaticPreview(); });
        document.getElementById('rotationRange').addEventListener('input', e => { state.rotation = +e.target.value; stopAndStaticPreview(); });
        document.getElementById('brightnessRange').addEventListener('input', e => { state.brightness = +e.target.value; document.getElementById('brightnessValue').textContent = e.target.value; stopAndStaticPreview(); });
        document.getElementById('contrastRange').addEventListener('input', e => { state.contrast = +e.target.value; document.getElementById('contrastValue').textContent = e.target.value; stopAndStaticPreview(); });
        document.getElementById('saturationRange').addEventListener('input', e => { state.saturation = +e.target.value; document.getElementById('saturationValue').textContent = e.target.value; stopAndStaticPreview(); });
        document.getElementById('pixelSizeRange').addEventListener('input', e => { state.pixelSize = +e.target.value; document.getElementById('pixelSizeVal').textContent = e.target.value; stopAndStaticPreview(); });
        document.getElementById('blurRadiusRange').addEventListener('input', e => { state.blurRadius = +e.target.value; document.getElementById('blurRadiusVal').textContent = e.target.value; stopAndStaticPreview(); });
        document.getElementById('sharpenStrRange').addEventListener('input', e => { state.sharpenStr = +e.target.value; document.getElementById('sharpenStrVal').textContent = (+e.target.value).toFixed(1); stopAndStaticPreview(); });
        document.getElementById('edgeThreshRange').addEventListener('input', e => { state.edgeThresh = +e.target.value; document.getElementById('edgeThreshVal').textContent = e.target.value; stopAndStaticPreview(); });
        document.getElementById('glitchStrRange').addEventListener('input', e => { state.glitchStr = +e.target.value; document.getElementById('glitchStrVal').textContent = e.target.value; stopAndStaticPreview(); });
        document.getElementById('glitchDensityRange').addEventListener('input', e => { state.glitchDensity = +e.target.value; document.getElementById('glitchDensityVal').textContent = e.target.value; stopAndStaticPreview(); });
        document.getElementById('colorCountRange').addEventListener('input', e => { state.colorCount = +e.target.value; document.getElementById('colorCountVal').textContent = e.target.value; stopAndStaticPreview(); });
        document.getElementById('ditherStrengthRange').addEventListener('input', e => { state.ditherStrength = +e.target.value; document.getElementById('ditherStrengthVal').textContent = e.target.value; stopAndStaticPreview(); });

        let gifWorkerBlobUrl = null;
        (async function () {
            try {
                const r = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
                gifWorkerBlobUrl = URL.createObjectURL(new Blob([await r.text()], { type: 'application/javascript' }));
            } catch (e) { }
        })();

        function stopAndStaticPreview() { stopAnimation(); updatePreview(); }
        function setMode(m) { state.mode = m; document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + m).classList.add('active'); stopAndStaticPreview(); }
        function setColorEffect(e) { state.colorEffect = e; document.querySelectorAll('[id^="color-"]').forEach(b => b.classList.remove('active')); document.getElementById('color-' + e).classList.add('active'); stopAndStaticPreview(); }
        function setSpecialEffect(e) { state.specialEffect = e; document.querySelectorAll('[id^="special-"]').forEach(b => b.classList.remove('active')); document.getElementById('special-' + e).classList.add('active'); document.querySelectorAll('.sub-control').forEach(el => el.classList.remove('visible')); const c = document.getElementById('ctrl-' + e); if (c) c.classList.add('visible'); stopAndStaticPreview(); }
        function setDither(d) { state.ditherMode = d; document.querySelectorAll('[id^="dither-"]').forEach(b => b.classList.remove('active')); document.getElementById('dither-' + d).classList.add('active'); stopAndStaticPreview(); }

        function handleFile(e) {
            const file = e.target.files[0]; if (!file) return;
            state.file = file; if (state.fileUrl) URL.revokeObjectURL(state.fileUrl);
            state.fileUrl = URL.createObjectURL(file); stopAnimation(); dropHint.style.display = 'none';
            document.getElementById('exportBtn').disabled = false;
            if (file.type === 'image/gif') {
                state.fileType = 'gif'; document.getElementById('previewBtn').disabled = false;
                const img = new Image(); img.onload = () => { state.width = img.naturalWidth; state.height = img.naturalHeight; statusEl.innerText = `已加载 ${state.width}×${state.height}，可以开始调整了`; if (hasNoEffects()) { previewImg.src = state.fileUrl; previewImg.style.display = 'block'; canvas.style.display = 'none'; } else updatePreview(); }; img.src = state.fileUrl;
            } else {
                state.fileType = 'static'; document.getElementById('previewBtn').disabled = true;
                const img = new Image(); img.onload = () => { state.imgStatic = img; state.width = img.naturalWidth; state.height = img.naturalHeight; statusEl.innerText = '图片就绪，调整参数后直接保存即可'; updatePreview(); }; img.src = state.fileUrl;
            }
        }

        function hasNoEffects() { return state.mode === 'none' && state.splitLevel === 0 && state.rotation === 0 && state.colorEffect === 'none' && state.specialEffect === 'none' && state.brightness === 0 && state.contrast === 100 && state.saturation === 100; }
        function shouldApplyQuantize() { return state.colorCount < 256 || (state.ditherMode !== 'none' && state.ditherMode !== 'auto'); }

        function updatePreview() {
            if (state.fileType === 'gif' && hasNoEffects()) { previewImg.src = state.fileUrl; previewImg.style.display = 'block'; canvas.style.display = 'none'; return; }
            previewImg.style.display = 'none'; canvas.style.display = 'block';
            if (state.fileType === 'static' && state.imgStatic) {
                const d = calcOutDims(state.width, state.height, state.rotation); canvas.width = d.width; canvas.height = d.height; drawEffect(ctx, state.imgStatic, state.width, state.height);
                if (shouldApplyQuantize()) {
                    const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    applyQuantizeAndDither(id, canvas.width, canvas.height, state.colorCount, state.ditherMode, state.ditherStrength);
                    ctx.putImageData(id, 0, 0);
                }
            } else if (state.fileType === 'gif') {
                const t = new Image();
                t.onload = () => { const d = calcOutDims(state.width, state.height, state.rotation); canvas.width = d.width; canvas.height = d.height; drawEffect(ctx, t, state.width, state.height); };
                t.src = state.fileUrl;
            }
        }

        function calcOutDims(w, h, r) { return (r === 1 || r === 3) ? { width: h, height: w } : { width: w, height: h }; }

        function drawEffect(tCtx, src, oW, oH) {
            const od = calcOutDims(oW, oH, state.rotation), ow = od.width, oh = od.height;
            tCtx.clearRect(0, 0, ow, oh);
            const rc = document.createElement('canvas'); rc.width = ow; rc.height = oh;
            const rx = rc.getContext('2d', { willReadFrequently: true }); rx.save();
            if (state.rotation === 1) { rx.translate(ow, 0); rx.rotate(Math.PI / 2); }
            else if (state.rotation === 2) { rx.translate(ow, oh); rx.rotate(Math.PI); }
            else if (state.rotation === 3) { rx.translate(0, oh); rx.rotate(-Math.PI / 2); }
            rx.drawImage(src, 0, 0, oW, oH); rx.restore();

        }

        function stampTransColor(imageData, tc) {
            const tr = (tc >> 16) & 0xFF, tg = (tc >> 8) & 0xFF, tb = tc & 0xFF, d = imageData.data;
            for (let i = 0; i < d.length; i += 4) { if (d[i + 3] < ALPHA_THRESHOLD) { d[i] = tr; d[i + 1] = tg; d[i + 2] = tb; d[i + 3] = 255; } }
        }

        // ====================================================================
        //  GIF 解码
        // ====================================================================
        async function decodeGif(buffer, onP) {
            const gr = new GifReader(buffer), n = gr.numFrames(), gw = gr.width, gh = gr.height;
            const comp = new Uint8ClampedArray(gw * gh * 4), frames = [];
            let hasTrans = false;
            for (let i = 0; i < n; i++) {
                const fi = gr.frameInfo(i); let snap = null;
                if (fi.disposal === 3) snap = new Uint8ClampedArray(comp);
                const tmp = new Uint8Array(gw * gh * 4); gr.decodeAndBlitFrameRGBA(i, tmp);
                for (let py = fi.y; py < fi.y + fi.height; py++) for (let px = fi.x; px < fi.x + fi.width; px++) { const idx = (py * gw + px) * 4; if (tmp[idx + 3] > 0) { comp[idx] = tmp[idx]; comp[idx + 1] = tmp[idx + 1]; comp[idx + 2] = tmp[idx + 2]; comp[idx + 3] = tmp[idx + 3]; } }
                if (!hasTrans) { for (let py = fi.y; py < fi.y + fi.height; py++) { for (let px = fi.x; px < fi.x + fi.width; px++) { if (comp[(py * gw + px) * 4 + 3] === 0) { hasTrans = true; break; } } if (hasTrans) break; } }
                frames.push({ imageData: new ImageData(new Uint8ClampedArray(comp), gw, gh), delay: (fi.delay > 0 ? fi.delay : 10) * 10 });
                if (fi.disposal === 2) { for (let py = fi.y; py < fi.y + fi.height; py++) for (let px = fi.x; px < fi.x + fi.width; px++) { const idx = (py * gw + px) * 4; comp[idx] = comp[idx + 1] = comp[idx + 2] = comp[idx + 3] = 0; } }
                else if (fi.disposal === 3 && snap) comp.set(snap);
                if (onP && i % 8 === 0) { onP(i, n); await new Promise(r => setTimeout(r, 0)); }
            }
            state.hasTransparency = hasTrans;
            return { allFrames: frames, gifWidth: gw, gifHeight: gh };
        }

        // ====================================================================
        //  应用特效到帧
        // ====================================================================
        async function processFrames(allFrames, gw, gh, fs, onP) {
            const od = calcOutDims(gw, gh, state.rotation);
            const sC = document.createElement('canvas'); sC.width = gw; sC.height = gh;
            const sX = sC.getContext('2d', { willReadFrequently: true });
            const rC = document.createElement('canvas'); rC.width = od.width; rC.height = od.height;
            const rX = rC.getContext('2d', { willReadFrequently: true });
            const out = []; let acc = 0, cnt = 0; const tot = Math.ceil(allFrames.length / fs);
            for (let i = 0; i < allFrames.length; i++) {
                acc += allFrames[i].delay; if (i % fs !== 0) continue;
                sX.putImageData(allFrames[i].imageData, 0, 0);
                rX.clearRect(0, 0, od.width, od.height);
                drawEffect(rX, sC, gw, gh);
                out.push({ imageData: rX.getImageData(0, 0, od.width, od.height), delay: acc });
                acc = 0; cnt++;
                if (onP && cnt % 3 === 0) { onP(cnt, tot); await new Promise(r => setTimeout(r, 0)); }
            }
            return { processedFrames: out, outDims: od };
        }

        // ====================================================================
        //  动画
        // ====================================================================
        function stopAnimation() { if (animTimerId !== null) { clearTimeout(animTimerId); animTimerId = null; } isAnimating = false; }
        function playFrames(frames, od) {
            previewImg.style.display = 'none'; canvas.style.display = 'block';
            canvas.width = od.width; canvas.height = od.height; isAnimating = true;
            let idx = 0;
            (function tick() { if (!isAnimating) return; ctx.putImageData(frames[idx].imageData, 0, 0); const dl = frames[idx].delay; idx = (idx + 1) % frames.length; animTimerId = setTimeout(tick, dl); })();
        }

        // ====================================================================
        //  预览
        // ====================================================================
        async function startPreview() {
            if (!state.file || state.fileType !== 'gif') return;
            stopAnimation();
            const btn = document.getElementById('previewBtn'), exp = document.getElementById('exportBtn');
            btn.disabled = exp.disabled = true;
            loadBarContainer.style.display = 'block'; progressBar.style.width = '0%'; statusEl.innerText = '读取中…';
            try {
                const buf = new Uint8Array(await state.file.arrayBuffer());
                const { allFrames, gifWidth, gifHeight } = await decodeGif(buf, (i, t) => {
                    progressBar.style.width = (i / t * 40) + '%';
                    statusEl.innerText = `读取画面 ${i + 1}/${t}`;
                });
                const fs = parseInt(document.getElementById('frameSampleRange').value);
                statusEl.innerText = '加工中…';
                const { processedFrames, outDims } = await processFrames(allFrames, gifWidth, gifHeight, fs, (d, t) => {
                    progressBar.style.width = (40 + d / t * 40) + '%';
                    statusEl.innerText = `加工中 ${d}/${t}`;
                });

                // 预览时也应用量化+抖动，让用户看到最终效果
                if (shouldApplyQuantize()) {
                    statusEl.innerText = '建立调色板…';
                    const colorMap = buildGlobalColorMap(processedFrames);
                    const palette = medianCut(colorMap, state.colorCount);
                    const match = createColorMatcher(palette);
                    const eff = resolveDitherMode(state.ditherMode, state.colorCount, palette.length);
                    statusEl.innerText = '应用调色…';
                    for (let i = 0; i < processedFrames.length; i++) {
                        applyDitherToFrame(processedFrames[i].imageData, outDims.width, outDims.height, palette, match, eff, state.ditherStrength);
                        if (i % 5 === 0) {
                            progressBar.style.width = (80 + i / processedFrames.length * 20) + '%';
                            await new Promise(r => setTimeout(r, 0));
                        }
                    }
                }

                loadBarContainer.style.display = 'none'; progressBar.style.width = '0%';
                btn.disabled = exp.disabled = false;
                statusEl.innerText = `▶ 共 ${processedFrames.length} 帧`;
                playFrames(processedFrames, outDims);
            } catch (err) {
                console.error(err);
                statusEl.innerText = '预览出了点问题：' + err.message;
                btn.disabled = exp.disabled = false;
                loadBarContainer.style.display = 'none';
            }
        }

        // ====================================================================
        //  导出下载
        // ====================================================================
        async function processAndExport() {
            if (!state.file) return alert("请先上传图片");
            const btn = document.getElementById('exportBtn'), pBtn = document.getElementById('previewBtn');
            btn.disabled = pBtn.disabled = true; stopAnimation();
            loadBarContainer.style.display = 'block'; progressBar.style.width = '0%'; statusEl.innerText = '准备中…';

            if (state.fileType === 'static') {
                try {
                    // 静态图也应用量化
                    if (shouldApplyQuantize()) {
                        const id = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        applyQuantizeAndDither(id, canvas.width, canvas.height, state.colorCount, state.ditherMode, state.ditherStrength);
                        ctx.putImageData(id, 0, 0);
                    }
                    const a = document.createElement('a'); a.download = 'meme_result.png'; a.href = canvas.toDataURL('image/png'); a.click();
                    statusEl.innerText = '已保存 ✓';
                } catch (e) { alert("保存失败: " + e.message); }
                btn.disabled = false; loadBarContainer.style.display = 'none'; return;
            }

            try {
                const buf = new Uint8Array(await state.file.arrayBuffer());
                const { allFrames, gifWidth, gifHeight } = await decodeGif(buf, (i, t) => {
                    progressBar.style.width = (i / t * 15) + '%';
                    statusEl.innerText = `读取画面 ${i + 1}/${t}`;
                });
                const fs = parseInt(document.getElementById('frameSampleRange').value);
                const q = parseInt(document.getElementById('qualityRange').value);
                statusEl.innerText = '加工中…';
                const { processedFrames, outDims } = await processFrames(allFrames, gifWidth, gifHeight, fs, (d, t) => {
                    progressBar.style.width = (15 + d / t * 25) + '%';
                    statusEl.innerText = `加工中 ${d}/${t}`;
                });

                // 量化 + 抖动
                if (shouldApplyQuantize()) {
                    statusEl.innerText = '建立调色板…';
                    const colorMap = buildGlobalColorMap(processedFrames);
                    const palette = medianCut(colorMap, state.colorCount);
                    const match = createColorMatcher(palette);
                    const eff = resolveDitherMode(state.ditherMode, state.colorCount, palette.length);
                    statusEl.innerText = '调色中…';
                    for (let i = 0; i < processedFrames.length; i++) {
                        applyDitherToFrame(processedFrames[i].imageData, outDims.width, outDims.height, palette, match, eff, state.ditherStrength);
                        if (i % 3 === 0) {
                            progressBar.style.width = (40 + i / processedFrames.length * 10) + '%';
                            statusEl.innerText = `调色中 ${i + 1}/${processedFrames.length}`;
                            await new Promise(r => setTimeout(r, 0));
                        }
                    }
                }

                if (!gifWorkerBlobUrl) {
                    const resp = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');
                    gifWorkerBlobUrl = URL.createObjectURL(new Blob([await resp.text()], { type: 'application/javascript' }));
                }
                statusEl.innerText = '打包中…';

                const gifOpts = { workers: 2, quality: q, width: outDims.width, height: outDims.height, workerScript: gifWorkerBlobUrl };

                if (state.hasTransparency) {
                    statusEl.innerText = '处理透明通道…';
                    const tc = findUnusedColor(processedFrames);
                    gifOpts.transparent = tc;
                    for (const f of processedFrames) stampTransColor(f.imageData, tc);
                }

                const enc = new GIF(gifOpts);
                const tC = document.createElement('canvas'); tC.width = outDims.width; tC.height = outDims.height;
                const tX = tC.getContext('2d', { willReadFrequently: true });
                for (const f of processedFrames) { tX.putImageData(f.imageData, 0, 0); enc.addFrame(tX, { copy: true, delay: f.delay, disposal: 2 }); }

                enc.on('progress', p => { progressBar.style.width = (50 + p * 50) + '%'; statusEl.innerText = `打包中 ${Math.round(p * 100)}%`; });
                enc.on('finished', blob => {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `meme_${Date.now()}.gif`; a.click();
                    btn.disabled = pBtn.disabled = false; loadBarContainer.style.display = 'none';
                    const kb = blob.size / 1024;
                    statusEl.innerText = `下载完成！文件大小：${kb > 1024 ? (kb / 1024).toFixed(1) + ' MB' : kb.toFixed(0) + ' KB'}`;
                });
                enc.render();
            } catch (err) {
                console.error(err); alert("处理失败: " + err.message);
                btn.disabled = pBtn.disabled = false; loadBarContainer.style.display = 'none';
            }
        }
    </script>
